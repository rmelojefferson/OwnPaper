site_name: OwnPaper
site_description: Documentacao tecnica e operacional do OwnPaper
repo_name: rmelojefferson/OwnPaper
repo_url: https://github.com/rmelojefferson/OwnPaper
use_directory_urls: true

theme:
  name: material
  language: pt-BR
  logo: assets/brand/ownpaper-logo-header.svg
  favicon: assets/brand/ownpaper-logo.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Alternar para tema escuro
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Alternar para tema claro
  features:
    - navigation.sections
    - navigation.indexes
    - content.code.copy

extra_css:
  - assets/stylesheets/ownpaper-20260619.css

nav:
  - Início: index.md
  - Tour visual: visual-tour.md
  - Demo local: demo-local.md
  - Instalação e operação:
      - Instalação com Docker: deployment/installation.md
      - Configuração por ambiente: deployment/configuration.md
      - Backups e restauração: deployment/backup-and-restore.md
      - Homologação: deployment/homologacao-checklist.md
      - Hardening de e-mail e formulários: deployment/email-and-forms-hardening.md
      - Shlink: deployment/shlink.md
      - HTTPS e reverse proxy: deployment/https-reverse-proxy.md
      - Fluxo de implementação: deployment/implementation-flow.md
      - Backlog de features: deployment/feature-backlog.md
      - Publicação no GitHub: deployment/github-publication.md
  - Funcionalidades:
      - Painel administrativo: features-admin.md
      - Publicações, notas e referências: features-publications.md
      - Fluxo editorial: features-editorial-flow.md
      - Quiz e perguntas reutilizáveis: features-quiz.md
      - Mídia e quarentena: features-media-quarantine.md
      - Comunicação e e-mails: features-communication.md
      - Indexador e submissões: features-indexer-submissions.md
      - Site público: features-public-site.md
      - Configurações e operação: features-settings-operations.md
      - Papéis e permissões: features-roles-permissions.md
      - Privacidade e estatísticas: features-privacy-analytics.md
  - Validação:
      - Empacotamento e GitHub: packaging-github.md
      - Smoke tests: smoke-tests.md
      - Política de upgrade LTS: upgrade-framework-lts.md
  - Projeto:
      - Governança e manutenção: governance-maintenance.md
      - Licenças e terceiros: licensing-third-party.md
      - Inventário de dependências Python: dependency-inventory.md
  - Skills:
      - Rollout OwnPaper: skills/ownpaper-standard-rollout.SKILL.md
