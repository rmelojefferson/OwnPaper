{% load static wagtailimages_tags %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E-mail enviado</title>
  {% include "includes/admin_favicon.html" %}
  <link rel="stylesheet" href="{% static 'css/auth-pages.css' %}?v=20260428-02">
  <style>
    .auth-layout {
      --auth-c1: {{ config_site.paleta_cor_1|default:"#1f3b5c" }};
      --auth-c2: {{ config_site.paleta_cor_2|default:"#3b82f6" }};
      --auth-c3: color-mix(in srgb, {{ config_site.paleta_cor_2|default:"#3b82f6" }} 62%, {{ config_site.paleta_cor_1|default:"#1f3b5c" }} 38%);
    }
  </style>
</head>
<body class="auth-layout">
  <div class="auth-shell">
    <div class="auth-card">
      <h1>E-mail enviado</h1>
      <p>Se o e-mail existir no sistema, você receberá um link para redefinir a senha.</p>
      <p class="auth-note"><a href="/account/login/">Voltar ao login</a></p>
    </div>
  </div>
</body>
</html>
