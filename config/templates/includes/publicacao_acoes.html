<div class="acoes-publicacao">
    <a
        class="acao-publicacao acao-pdf"
        href="{% url 'publicacao_pdf' page.id %}"
        target="_blank"
        rel="noopener"
        aria-label="Abrir PDF"
        title="Abrir PDF"
    >
        PDF
    </a>

    <a
        class="acao-publicacao acao-whatsapp"
        href="https://wa.me/?text={{ page.title|urlencode }}%20{{ request.build_absolute_uri|urlencode }}"
        target="_blank"
        rel="noopener"
        aria-label="Compartilhar no WhatsApp"
        title="Compartilhar no WhatsApp"
    >
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12.04 2C6.57 2 2.12 6.45 2.12 11.92c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.01c5.47 0 9.92-4.45 9.92-9.92C21.97 6.45 17.52 2 12.04 2zm0 18.17h-.01a8.2 8.2 0 0 1-4.18-1.14l-.3-.18-3.12.82.83-3.04-.2-.31a8.24 8.24 0 1 1 6.98 3.85zm4.53-6.16c-.25-.12-1.47-.72-1.7-.8-.23-.08-.39-.12-.56.12-.16.25-.64.8-.78.97-.14.16-.29.18-.54.06-.25-.12-1.05-.39-2-1.23-.74-.66-1.24-1.47-1.38-1.72-.14-.25-.02-.38.11-.5.11-.11.25-.29.37-.43.12-.14.16-.25.25-.41.08-.16.04-.31-.02-.43-.06-.12-.56-1.35-.77-1.85-.2-.49-.41-.42-.56-.43h-.48c-.16 0-.43.06-.66.31-.23.25-.87.85-.87 2.08 0 1.23.89 2.41 1.02 2.58.12.16 1.76 2.69 4.27 3.77.6.26 1.06.41 1.43.52.6.19 1.14.16 1.57.1.48-.07 1.47-.6 1.68-1.18.21-.58.21-1.08.14-1.18-.06-.1-.23-.16-.48-.29z"></path>
        </svg>
    </a>

    <a
        class="acao-publicacao acao-telegram"
        href="https://t.me/share/url?url={{ request.build_absolute_uri|urlencode }}&text={{ page.title|urlencode }}"
        target="_blank"
        rel="noopener"
        aria-label="Compartilhar no Telegram"
        title="Compartilhar no Telegram"
    >
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21.94 4.16 18.57 20.1c-.25 1.13-.92 1.41-1.86.88l-5.14-3.79-2.48 2.39c-.27.27-.5.5-1.03.5l.37-5.23 9.52-8.6c.41-.37-.09-.58-.64-.21L5.54 13.45.47 11.86c-1.1-.34-1.12-1.1.23-1.63L20.5 2.6c.92-.34 1.72.2 1.44 1.56z"></path>
        </svg>
    </a>

    <a
        class="acao-publicacao acao-linkedin"
        href="https://www.linkedin.com/sharing/share-offsite/?url={{ request.build_absolute_uri|urlencode }}"
        target="_blank"
        rel="noopener"
        aria-label="Compartilhar no LinkedIn"
        title="Compartilhar no LinkedIn"
    >
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.41v1.56h.05c.47-.9 1.64-1.85 3.37-1.85 3.61 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45z"></path>
        </svg>
    </a>

    <a
        class="acao-publicacao acao-x"
        href="https://twitter.com/intent/tweet?url={{ request.build_absolute_uri|urlencode }}&text={{ page.title|urlencode }}"
        target="_blank"
        rel="noopener"
        aria-label="Compartilhar no X"
        title="Compartilhar no X"
    >
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18.9 2h3.32l-7.25 8.28L23.5 22h-6.68l-5.23-6.84L5.6 22H2.28l7.75-8.86L1.85 2h6.85l4.73 6.25L18.9 2zm-1.17 17.94h1.84L7.7 3.96H5.72l12.01 15.98z"></path>
        </svg>
    </a>

    <button
        type="button"
        class="acao-publicacao copiar-link-publicacao"
        aria-label="Copiar link"
        title="Copiar link"
    >
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7a3.2 3.2 0 0 0 0-1.39l7.05-4.11A3 3 0 1 0 15 5c0 .24.03.47.08.69L8.03 9.8a3 3 0 1 0 0 4.4l7.12 4.17c-.05.2-.07.42-.07.63a2.92 2.92 0 1 0 2.92-2.92z"></path>
        </svg>
    </button>
</div>
